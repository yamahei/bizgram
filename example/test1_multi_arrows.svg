    </marker>
    <marker id="marker_other" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 10,3 L 0,6 Z" fill="#000000"/>
    </marker>
  </defs>

