    <marker id="marker_other" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 10,3 L 0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Entities -->
  <g id="entity_0">
    <image x="426.1472" y="0" width="72.47241" height="132.75592" href="data:image/svg+xml;base64,"/>
    <text x="462.383405" y="140.75592" font-size="14" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-before-edge" fill="#000000" word-spacing="0" letter-spacing="0" style="white-space: pre-wrap; word-wrap: break-word;">Company A</text>
